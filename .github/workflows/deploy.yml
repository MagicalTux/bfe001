name: Build & Deploy

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python build.py

      - name: Collect site output
        run: |
          mkdir _site
          cp -r *.html style.css ja/ _site/
          for d in amiga blog images fonts static; do
            [ -d "$d" ] && cp -r "$d" _site/ || true
          done
          for f in CNAME sitemap.xml news-sitemap.xml robots.txt feed.xml atom.xml; do
            [ -f "$f" ] && cp "$f" _site/ || true
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deployment
