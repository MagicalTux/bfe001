{% extends "base.html" %}

{% block after_nav %}
    <section class="hero">
        <div class="hero-addr"><span>$</span>BFE001 &mdash; CIA-A REGISTER</div>
        <h1 class="hero-title">BFE001</h1>
        <div class="hero-reg"><span class="led-indicator"></span>{{ strings.hero.reg }}</div>
        <p class="hero-subtitle">{{ strings.hero.subtitle }}</p>
    </section>
{% endblock %}

{% block content %}
    {% for section in sections %}
    <section>
        <div class="section-header">
            <span class="section-addr">{{ section.addr }}</span>
            <h2 class="section-title">{{ section.title }}</h2>
        </div>
        <div class="prose">
            {{ section.content }}
        </div>
    </section>
    {% endfor %}
{% endblock %}
